<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Desafío: El Gólem de los Ecos</title>
  <style>
    body { background-color: #1a1e24; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
    h1 { color: #8ba989; }
    
    /* Contenedores estándar para el login */
    .container { max-width: 800px; margin: 0 auto; background: #2a2f35; padding: 20px; border-radius: 10px; border: 2px solid #4a554e; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
    
    input[type="text"] { width: 80%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #555; background: #1a1e24; color: white; font-size: 16px; }
    button { background-color: #557a55; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
    button:hover { background-color: #6a966a; }
    
    /* --- !!! NUEVA SECCIÓN DE INTRO: TERMINAL MÁGICA !!! --- */
    #intro-section {
      display: none; /* Oculto por defecto */
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; height: 100vh; 
      background-color: black; /* Fondo negro puro */
      z-index: 9999; 
      flex-direction: column; 
      justify-content: flex-start; /* Texto arriba */
      align-items: flex-start; /* Texto a la izquierda */
      padding: 50px;
      box-sizing: border-box;
      
      /* Fuente monoespaciada tipo código con brillo verde neón */
      font-family: 'Courier New', Courier, monospace;
      color: #00ff00; 
      text-shadow: 0 0 5px #00ff00;
      font-size: 1.1em;
      text-align: left;
      line-height: 1.6;
      
      /* Efecto sutil de líneas de escaneo de monitor CRT */
      background-image: linear-gradient(0deg, rgba(0,0,0,0.1) 50%, rgba(255,255,255,0.02) 50%);
      background-size: 100% 4px;
    }
    
    .terminal-line {
      opacity: 0; /* Empiezan invisibles */
      margin: 0;
      animation: fadeInTerminalLine 0.1s forwards; /* Aparecen rápido */
    }

    /* --- ESTILOS DEL CHAT (Mantenidos y mejorados) --- */
    #chat-container { display: none; } 
    
    /* Diseño de dos columnas (Flexbox) */
    #chat-layout { display: flex; max-width: 1000px; margin: 20px auto; gap: 30px; align-items: flex-start; justify-content: center; }

    /* Columna IZQUIERDA: Retrato del Gólem */
    #golem-portrait { flex: 1; max-width: 250px; background: #2a2f35; padding: 15px; border-radius: 50%; border: 3px solid #8ba989; box-shadow: 0 0 15px rgba(139, 169, 137, 0.4); animation: pulseSmall 4s infinite ease-in-out; }
    #golem-portrait img { width: 100%; height: auto; border-radius: 50%; }

    /* Columna DERECHA: Ventana de Chat */
    #chat-window { flex: 2; background: #2a2f35; padding: 20px; border-radius: 10px; border: 2px solid #4a554e; display: flex; flex-direction: column; gap: 15px; }
    
    #messages { height: 500px; overflow-y: auto; background: #1f2328; padding: 20px; border-radius: 5px; border: 1px inset #000; display: flex; flex-direction: column; gap: 15px; }
    
    .msg { padding: 12px 18px; border-radius: 8px; max-width: 85%; text-align: left; font-size: 17px; line-height: 1.4; animation: fadeInMsg 0.3s ease-out; }
    .user { background: #2b5b84; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
    .golem { background: #3d453f; align-self: flex-start; border-left: 4px solid #8ba989; color: #e0e0e0; border-bottom-left-radius: 2px; }

    /* Indicador de "escribiendo" del Gólem */
    .typing-indicator { font-style: italic; color: #aaa; margin-left: 10px; display: flex; gap: 5px; }
    .dot { width: 6px; height: 6px; background-color: #aaa; border-radius: 50%; animation: blink typingBlink infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* --- ANIMACIONES CSS --- */
    @keyframes fadeInMsg { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes typingBlink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    
    /* Animación para que aparezcan las líneas de terminal */
    @keyframes fadeInTerminalLine { to { opacity: 1; } }

    /* Efecto de parpadeo de monitor fallando (Flicker) */
    @keyframes flickerIntro {
      0% { opacity: 1; }
      10% { opacity: 0.1; }
      15% { opacity: 1; }
      30% { opacity: 0.5; }
      40% { opacity: 1; }
      100% { opacity: 1; }
    }

    /* Pulse anim for chat portrait */
    @keyframes pulseSmall { 
      0% { transform: scale(1); box-shadow: 0 0 15px rgba(139, 169, 137, 0.4); } 
      50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(139, 169, 137, 0.6); } 
      100% { transform: scale(1); box-shadow: 0 0 15px rgba(139, 169, 137, 0.4); } 
    }

  </style>
</head>
<body>

  <div class="container" id="login-section">
    <h1>Portal del Valle de los Naturales</h1>
    <p>Ingresa la palabra mágica para revelar al Guardián:</p>
    <input type="text" id="pass" placeholder="Contraseña de la clase">
    <br>
    <button onclick="checkPass()">Invocar</button>
  </div>

  <div id="intro-section">
    </div>

  <div id="chat-container">
    <div id="chat-layout">
      
      <div id="golem-portrait">
        <img src="golem-icon.png" alt="Retrato del Gólem">
      </div>
      
      <div id="chat-window">
        <div id="messages"></div>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="userInput" placeholder="Escribe tu respuesta al Gólem...">
          <button onclick="sendMessage()">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let chatHistory = [];
    const firstMessageText = 'Soy el Gólem de los Ecos. Para cruzar mis dominios, debes probar tu dominio sobre los números. Dime, joven errante: ¿Cómo se lee el número grabado en mi pecho? Escríbelo con palabras: 4.072.508';

    // Líneas de pseudo-código para la terminal
    const terminalLines = [
      '> INICIANDO SECUENCIA DE ACCESO...',
      '> ESTABLECIENDO CONEXIÓN RÚNICA... [OK]',
      '> ESCANEANDO SECTOR: VALLE DE LOS NATURALES...',
      '> DETECTADA ENTIDAD DE CLASE: GÓLEM...',
      '> ESTADO: DESPIERTO. ADVERTENCIA: SISTEMAS DEFENSIVOS ACTIVOS.',
      '> ABRIENDO CANAL DE COMUNICACIÓN...'
    ];

    function checkPass() {
      if(document.getElementById('pass').value.toUpperCase() === 'MATEMATICA2026') {
        document.getElementById('login-section').style.display = 'none';
        
        // --- !!! INICIAR SECUENCIA DE TERMINAL MÁGICA !!! ---
        const introSection = document.getElementById('intro-section');
        introSection.style.display = 'flex';
        introSection.innerHTML = ''; // Limpiar intro

        // Función recursiva para mostrar líneas secuencialmente
        let lineIndex = 0;
        function showNextLine() {
          if (lineIndex < terminalLines.length) {
            const lineP = document.createElement('p');
            lineP.className = 'terminal-line';
            lineP.innerText = terminalLines[lineIndex];
            introSection.appendChild(lineP);
            lineIndex++;
            // Retraso aleatorio corto entre líneas para realismo (50-200ms)
            setTimeout(showNextLine, Math.random() * 150 + 50); 
          } else {
            // --- FIN DE LA SECUENCIA DE TERMINAL ---
            // 1. Aplicar efecto de parpadeo (flicker) final
            introSection.style.animation = 'flickerIntro 0.5s linear forwards';
            
            // 2. Transición instantánea al chat después del parpadeo
            setTimeout(() => {
              introSection.style.display = 'none'; // Ocultar intro
              
              // Cargar chat con primer mensaje y mostrar
              const chatContainer = document.getElementById('chat-container');
              if (document.getElementById('messages').innerHTML === '') {
                addMsg('Gólem', firstMessageText);
              }
              chatContainer.style.display = 'flex';
            }, 500); // Duración exacta de la animación flicker
          }
        }
        
        // Empezar a mostrar líneas
        showNextLine();

      } else {
        alert('Las runas no brillan. Contraseña incorrecta.');
      }
    }

    function addMsg(sender, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + (sender === 'Tú' ? 'user' : 'golem');
      div.innerText = text;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.id = 'typing-bubbling';
      div.className = 'msg golem typing-indicator';
      div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function hideTyping() {
      const typingIndicator = document.getElementById('typing-bubbling');
      if (typingIndicator) {
        typingIndicator.remove();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if(!text) return;
      
      addMsg('Tú', text);
      input.value = '';
      chatHistory.push({ role: "user", parts: [{ text: text }] });

      showTyping();

      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history: chatHistory })
      });
      
      const data = await response.json();
      
      hideTyping();

      addMsg('Gólem', data.reply);
      chatHistory.push({ role: "model", parts: [{ text: data.reply }] });
    }
  </script>
</body>
</html>
